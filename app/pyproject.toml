    "attrs==25.4.0",
    "blinker==1.9.0",
    "cachetools==7.0.3",
    "certifi==2026.2.25",
    "charset-normalizer==3.4.5",
    "click==8.3.1",
    "colorama==0.4.6",
    "connectorx==0.4.5",
    "gitdb==4.0.12",
    "gitpython==3.1.46",
    "idna==3.11",
    "jinja2==3.1.6",
    "jsonschema==4.26.0",
    "jsonschema-specifications==2025.9.1",
    "markupsafe==3.0.3",
    "matplotlib==3.10.7",
    "narwhals==2.17.0",
    "numpy==2.4.2",
    "packaging==26.0",
    "pandas==2.3.3",
    "pillow==12.1.1",
    "plotly==6.6.0",
    "kaleido==1.1.0",
    "polars==1.38.1",
    "polars-runtime-32==1.38.1",
    "protobuf==6.33.5",
