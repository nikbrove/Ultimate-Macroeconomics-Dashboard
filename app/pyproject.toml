    "python-dotenv==1.2.1",
    "pytz==2026.1.post1",
    "referencing==0.37.0",
    "requests==2.32.5",
    "qdrant-client==1.17.0",
    "pyyaml==6.0.3",
    "rpds-py==0.30.0",
    "six==1.17.0",
    "smmap==5.0.2",
    "streamlit==1.55.0",
    "tenacity==9.1.4",
    "toml==0.10.2",
    "tornado==6.5.4",
    "typing-extensions==4.15.0",
    "tzdata==2025.3",
    "urllib3==2.6.3",
    "watchdog==6.0.0",
    "wordcloud==1.9.4",
