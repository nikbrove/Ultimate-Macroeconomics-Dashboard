name: Ultimate_Macroeconomics_Dashboard

services:

  db:
    image: postgres:18
    restart: unless-stopped
    container_name: postgres_db
    env_file:
      - ./_container_data/.env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./_container_data/init-user.sh:/docker-entrypoint-initdb.d/init-user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USERNAME} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vector_db:
    image: qdrant/qdrant:v1.17
    restart: unless-stopped
    container_name: qdrant_db
    env_file:
      - ./_container_data/.env
    ports:
      - 6333:6333
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s

  downloader_general:
    build:
      context: downloader_general
      dockerfile: Dockerfile
    container_name: downloader_general
    restart: "no"
    tty: true
    env_file:
      - ./_container_data/.env
    depends_on:
      db:
        condition: service_healthy
      vector_db:
        condition: service_healthy
    volumes:
      - ./_container_data/config.yaml:/app/config.yaml:ro
      - ./_container_data/database_schema.yaml:/app/database_schema.yaml:ro
      - ./_container_data/_configs:/app/_configs
      - ./_container_data/downloader_general:/app/_container_data

  agent:
    build:
      context: agent
      dockerfile: Dockerfile
    container_name: agent
    restart: unless-stopped
    env_file:
      - ./_container_data/.env
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
      vector_db:
        condition: service_healthy
      downloader_general:
        condition: service_completed_successfully
      downloader_extra:
        condition: service_healthy
    volumes:
      - ./_container_data/config.yaml:/app/config.yaml:ro
      - ./_container_data/database_schema.yaml:/app/database_schema.yaml:ro
      - ./_container_data/_configs:/app/_configs:ro
      - ./_container_data/agent:/app/_container_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  forecaster:
    build:
      context: forecaster
      dockerfile: Dockerfile
    container_name: forecaster
    restart: unless-stopped
    env_file:
      - ./_container_data/.env
    ports:
      - 8001:8001
    depends_on:
      db:
        condition: service_healthy
      vector_db:
        condition: service_healthy
      downloader_general:
        condition: service_completed_successfully
    volumes:
      - ./_container_data/config.yaml:/app/config.yaml:ro
      - ./_container_data/forecaster:/app/_container_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s
    # remove `deploy` part if no GPU available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  clustering:
    build:
      context: clustering
      dockerfile: Dockerfile
    container_name: clustering
    restart: unless-stopped
    env_file:
      - ./_container_data/.env
    ports:
      - 8002:8002
    depends_on:
      db:
        condition: service_healthy
      vector_db:
        condition: service_healthy
      downloader_general:
        condition: service_completed_successfully
    volumes:
      - ./_container_data/config.yaml:/app/config.yaml:ro
      - ./_container_data/clustering:/app/_container_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  downloader_extra:
    build:
      context: downloader_extra
      dockerfile: Dockerfile
    container_name: downloader_extra
    restart: unless-stopped
    env_file:
      - ./_container_data/.env
    ports:
      - 8003:8003
    depends_on:
      db:
        condition: service_healthy
      vector_db:
        condition: service_healthy
      downloader_general:
        condition: service_completed_successfully
    volumes:
      - ./_container_data/config.yaml:/app/config.yaml:ro
      - ./_container_data/downloader_extra:/app/_container_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s

  python_sandbox:
    build:
      context: python_sandbox
      dockerfile: Dockerfile
    container_name: python_sandbox
    restart: unless-stopped
    env_file:
      - ./_container_data/.env
    ports:
      - 8004:8004
    depends_on:
      db:
        condition: service_healthy
      vector_db:
        condition: service_healthy
      downloader_general:
        condition: service_completed_successfully
    volumes:
      - ./_container_data/config.yaml:/app/config.yaml:ro
      - ./_container_data/python_sandbox:/app/_container_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8004/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: app
      dockerfile: Dockerfile
    container_name: app
    restart: unless-stopped
    env_file:
      - ./_container_data/.env
    ports:
      - 8501:8501
    depends_on:
      db:
        condition: service_healthy
      vector_db:
        condition: service_healthy
      agent:
        condition: service_healthy
      forecaster:
        condition: service_healthy
      clustering:
        condition: service_healthy
      python_sandbox:
        condition: service_healthy
      downloader_general:
        condition: service_completed_successfully
      downloader_extra:
        condition: service_healthy
    volumes:
      - ./_container_data/config.yaml:/app/config.yaml:ro
      - ./_container_data/themes.yaml:/app/themes.yaml
      - ./_container_data/_configs:/app/_configs
      - ./_container_data/app:/app/_container_data
      # Read-only docker socket so the Monitoring page can read container stats.
      # The app process inside the container runs as root, so it can talk to
      # the socket directly. Remove this mount if you don't want the dashboard
      # to introspect the host's containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  default:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
